<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AppSec Days PT 2026 — I'm Speaking</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root { --ink:#0a0e1a; --ink-2:#0e1424; --ink-3:#141b30; --blue:#2b8aff; --violet:#7b3fff; --cyan:#26d4ff; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #1a1a2e; font-family: 'DM Sans', system-ui, sans-serif; }
  #stage { position:fixed; inset:0; bottom:80px; display:flex; align-items:center; justify-content:center; }
  #scaler-wrapper { position:relative; }
  #scaler { position:absolute; top:0; left:0; width:1080px; height:1080px; transform-origin:top left; }
  #toolbar { position:fixed; bottom:0; left:0; right:0; height:80px; background:rgba(8,12,24,0.97); backdrop-filter:blur(16px); border-top:1px solid rgba(255,255,255,0.12); display:flex; align-items:center; justify-content:space-between; padding:0 28px; gap:20px; z-index:100; }
  .back-link { color:rgba(255,255,255,0.4); text-decoration:none; font-size:13px; display:flex; align-items:center; gap:6px; transition:color 0.15s; white-space:nowrap; }
  .back-link:hover { color:#fff; }
  .toolbar-center { display:flex; align-items:center; gap:16px; }
  .btn-add-photo { display:flex; align-items:center; gap:10px; padding:13px 24px; border-radius:10px; border:1.5px solid rgba(38,212,255,0.55); background:rgba(38,212,255,0.1); color:#26d4ff; font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:0.14em; text-transform:uppercase; cursor:pointer; transition:background 0.15s, border-color 0.15s; white-space:nowrap; }
  .btn-add-photo:hover { background:rgba(38,212,255,0.18); border-color:rgba(38,212,255,0.8); }
  .btn-add-photo.done { border-color:rgba(255,255,255,0.1); color:rgba(255,255,255,0.3); background:transparent; }
  .step-sep { color:rgba(255,255,255,0.2); font-size:20px; line-height:1; }
  .edit-hint { font-size:13px; color:rgba(255,255,255,0.35); font-family:'JetBrains Mono',monospace; letter-spacing:0.06em; white-space:nowrap; }
  #export-btn { display:flex; align-items:center; gap:10px; padding:13px 24px; border-radius:10px; border:none; background:linear-gradient(135deg,#2b8aff,#7b3fff); color:#fff; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; transition:opacity 0.15s; white-space:nowrap; }
  #export-btn:hover { opacity:0.88; }
  #export-btn:disabled { opacity:0.4; cursor:default; }
  .card { position:relative; overflow:hidden; color:#fff; background:var(--ink); isolation:isolate; -webkit-font-smoothing:antialiased; }
  .card, .card * { box-sizing:border-box; }
  .card h1, .card h2, .card h3, .card h4, .card p { margin:0; }
  .card .ink-bg { position:absolute; inset:0; background:radial-gradient(ellipse 70% 80% at 12% 18%, rgba(123,63,255,0.55), transparent 60%), radial-gradient(ellipse 80% 70% at 88% 86%, rgba(43,138,255,0.55), transparent 60%), linear-gradient(135deg, #060914 0%, #0a0e1a 40%, #141a36 100%); }
  .card .grid-overlay { position:absolute; inset:0; background-image:linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px); background-size:32px 32px; mask-image:radial-gradient(ellipse at center, black 30%, transparent 80%); pointer-events:none; }
  .card .noise { position:absolute; inset:0; pointer-events:none; mix-blend-mode:overlay; opacity:0.5; background-image:radial-gradient(circle at 25% 30%, rgba(255,255,255,0.05) 0, transparent 30%), radial-gradient(circle at 75% 70%, rgba(255,255,255,0.04) 0, transparent 40%); }
  .display { font-family:'Barlow Condensed', sans-serif; font-weight:900; line-height:0.88; letter-spacing:-0.01em; text-transform:uppercase; }
  .mono { font-family:'JetBrains Mono', ui-monospace, monospace; }
  .kicker { font-family:'JetBrains Mono', monospace; letter-spacing:0.22em; text-transform:uppercase; }
  .pill { display:inline-flex; align-items:center; gap:10px; font-family:'JetBrains Mono', monospace; letter-spacing:0.28em; text-transform:uppercase; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.2); padding:8px 14px; border-radius:999px; }
  .pill::before { content:""; width:7px; height:7px; border-radius:50%; background:var(--cyan); box-shadow:0 0 12px var(--cyan); }
  image-slot { background:linear-gradient(135deg, #1a2138, #0e1424); border:1px solid rgba(255,255,255,0.14); color:rgba(255,255,255,0.55); }
  .foot-bar { display:flex; justify-content:space-between; align-items:center; gap:16px; border-top:1px solid rgba(255,255,255,0.16); padding-top:14px; }
  .foot-bar .mono { font-size:10px; letter-spacing:0.22em; color:rgba(255,255,255,0.7); text-transform:uppercase; }
  .lockup-mini { height:28px; display:flex; align-items:center; }
  .lockup-mini img { height:100%; width:auto; display:block; }
  .stamp { display:inline-flex; align-items:center; gap:10px; font-family:'JetBrains Mono', monospace; letter-spacing:0.28em; text-transform:uppercase; padding:8px 14px; border-radius:999px; }
  .stamp.cyan { background:rgba(38,212,255,0.12); border:1px solid rgba(38,212,255,0.55); color:var(--cyan); }
  .stamp.violet { background:rgba(123,63,255,0.14); border:1px solid rgba(123,63,255,0.55); color:#c4a8ff; }
  .stamp::before { content:""; width:7px; height:7px; border-radius:50%; background:currentColor; box-shadow:0 0 12px currentColor; }
  [contenteditable="true"] { outline:none; cursor:text; }
  [contenteditable="true"]:hover { background:rgba(255,255,255,0.05); border-radius:4px; }
  [contenteditable="true"]:focus { background:rgba(38,212,255,0.08); box-shadow:0 0 0 1px rgba(38,212,255,0.3); border-radius:4px; }
</style>
</head>
<body>

<div id="stage">
  <div id="scaler-wrapper">
    <div id="scaler">
      <div id="root"></div>
    </div>
  </div>
</div>

<div id="toolbar">
  <a href="../index.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 11L5 7l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    All templates
  </a>
  <div class="toolbar-center">
    <button class="btn-add-photo" id="add-photo-btn" onclick="addPhoto()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="4" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.3"/><circle cx="7" cy="8.5" r="2.2" stroke="currentColor" stroke-width="1.3"/><path d="M5 4l.8-1.5h2.4L9 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span data-en="Add Your Photo" data-pt="Adicionar Foto">Add Your Photo</span>
    </button>
    <span class="step-sep">→</span>
    <span class="edit-hint" data-en="then click any text to edit" data-pt="depois clica no texto para editar">then click any text to edit</span>
  </div>
  <button id="export-btn" onclick="exportCard()">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v7m0 0L4.5 6.5M7 9l2.5-2.5M2 11.5v.5a.5.5 0 00.5.5h9a.5.5 0 00.5-.5v-.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span data-en="Download PNG" data-pt="Descarregar PNG">Download PNG</span>
  </button>
</div>

<script src="image-slot.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js" crossorigin></script>

<script type="text/babel" src="social-cards.jsx"></script>
<script type="text/babel" src="cards-square.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(<SquareSpeaker />);
</script>

<script>
  (function() {
    const lang = localStorage.getItem('badge-lang') || 'en';
    document.querySelectorAll('[data-en]').forEach(el => {
      el.textContent = lang === 'pt' ? el.dataset.pt : el.dataset.en;
    });
  })();

  const CARD_SIZE = 1080;

  function updateScale() {
    const availW = window.innerWidth  - 64;
    const availH = window.innerHeight - 80 - 64;
    const scale  = Math.min(availW / CARD_SIZE, availH / CARD_SIZE, 1);
    const wrapper = document.getElementById('scaler-wrapper');
    wrapper.style.width  = (CARD_SIZE * scale) + 'px';
    wrapper.style.height = (CARD_SIZE * scale) + 'px';
    document.getElementById('scaler').style.transform = `scale(${scale})`;
  }

  window.addEventListener('resize', updateScale);
  setTimeout(updateScale, 200);

  function addPhoto() {
    const slot = document.querySelector('image-slot');
    if (slot) slot.triggerPicker();
  }

  document.addEventListener('photo-loaded', () => {
    const btn = document.getElementById('add-photo-btn');
    if (btn) btn.classList.add('done');
  });

  async function exportCard() {
    const btn    = document.getElementById('export-btn');
    const card   = document.querySelector('.card');
    const scaler = document.getElementById('scaler');
    const wrapper = document.getElementById('scaler-wrapper');
    if (!card) return;

    btn.disabled    = true;
    btn.textContent = 'Exporting…';

    const saved = {
      transform: scaler.style.transform,
      position:  wrapper.style.position,
      left:      wrapper.style.left,
      top:       wrapper.style.top,
      width:     wrapper.style.width,
      height:    wrapper.style.height,
    };

    wrapper.style.position = 'fixed';
    wrapper.style.left     = '-2000px';
    wrapper.style.top      = '0';
    wrapper.style.width    = CARD_SIZE + 'px';
    wrapper.style.height   = CARD_SIZE + 'px';
    scaler.style.transform = 'scale(1)';

    await new Promise(r => setTimeout(r, 60));

    try {
      const canvas = await html2canvas(card, {
        scale: 1, useCORS: true, allowTaint: true,
        backgroundColor: null, logging: false,
        width: CARD_SIZE, height: CARD_SIZE,
      });
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'appsecdays-speaking-badge.png';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 2000);
      }, 'image/png');
    } finally {
      Object.assign(wrapper.style, { position: saved.position, left: saved.left, top: saved.top, width: saved.width, height: saved.height });
      scaler.style.transform = saved.transform;
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v7m0 0L4.5 6.5M7 9l2.5-2.5M2 11.5v.5a.5.5 0 00.5.5h9a.5.5 0 00.5-.5v-.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Download PNG';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
